<mat-card>

    <form #stdForm="ngForm" (ngSubmit)="OnAddStd()">
        <div class="form-group">
            <label for="fname">fname*</label>
            <input 
            required
            ngModel
            name="fname"
            #fname="ngModel"
            type="text" class="form-control">

            <strong *ngIf="fname.touched && fname.hasError('required')">
                <p class="text-danger">this is required field</p>
            </strong>
        </div>

        <div class="form-group">
            <label for="lname">lname*</label>
            <input 
            required
            ngModel
            name="lname"
            #lname="ngModel"
            type="text" class="form-control">

            <strong *ngIf="lname.touched && lname.hasError('required')">
                <p class="text-danger">this is required field</p>
            </strong>
        </div>

        <div class="form-group">
            <label for="email">email*</label>
            <input 
            required
            ngModel
            name="email"
            #email="ngModel"
            type="text" class="form-control">

            <strong *ngIf="email.touched && email.hasError('required')">
                <p class="text-danger">this is required field</p>
            </strong>
        </div>

        <div class="form-group">
            <label for="contact">contact*</label>
            <input 
            required
            ngModel
            name="contact"
            #contact="ngModel"
            type="text" class="form-control">

            <strong *ngIf="contact.touched && contact.hasError('required')">
                <p class="text-danger">this is required field</p>
            </strong>
        </div>

        <div class="form-group">
            <label for="isActive">isActive*</label>
            <select 
            required
            ngModel
            name="isActive"
            #isActive="ngModel"
            type="text" class="form-control">
                 <option value="true">Yes</option>
                 <option value="false">No</option>
        </select>
        </div>

        <button
        *ngIf="!isIneditMode"
        mat-raised-button color="primary">Add button</button>

        <button
        *ngIf="isIneditMode"
        (click)="OnUpdate()"
        mat-raised-button color="primary">Update button</button>

    </form>
</mat-card>
